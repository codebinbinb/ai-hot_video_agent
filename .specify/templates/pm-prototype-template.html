<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{功能名} - 原型</title>
    <!-- 元信息（便于索引提取） -->
    <meta name="prototype-name" content="{功能名}">
    <meta name="prototype-iteration" content="{迭代名称}">
    <meta name="prototype-author" content="{产品经理}">
    <meta name="prototype-created" content="{创建日期}">
    <meta name="prototype-updated" content="{更新日期}">
    <meta name="prototype-description" content="{功能描述}">
    
    <style>
        /* ============ 基础重置 ============ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        /* ============ 系统字体 ============ */
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 
                         'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 
                         sans-serif;
            line-height: 1.6;
            color: #333;
            background: #f5f5f5;
            min-height: 100vh;
        }
        
        /* ============ 容器 ============ */
        .container {
            max-width: 480px;
            margin: 0 auto;
            background: white;
            min-height: 100vh;
            box-shadow: 0 0 20px rgba(0,0,0,0.1);
        }
        
        /* ============ 头部 ============ */
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            text-align: center;
        }
        
        .header h1 {
            font-size: 1.5em;
            font-weight: 600;
        }
        
        .header p {
            opacity: 0.8;
            font-size: 0.9em;
            margin-top: 5px;
        }
        
        /* ============ 内容区 ============ */
        .content {
            padding: 20px;
        }
        
        /* ============ 表单样式 ============ */
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 500;
            color: #333;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .form-group .error {
            border-color: #e74c3c;
        }
        
        .form-group .error-message {
            color: #e74c3c;
            font-size: 0.85em;
            margin-top: 5px;
        }
        
        /* ============ 按钮样式 ============ */
        .btn {
            display: inline-block;
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-align: center;
            text-decoration: none;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 100%;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-1px);
        }
        
        .btn-primary:active {
            transform: translateY(0);
        }
        
        .btn-secondary {
            background: #eee;
            color: #333;
        }
        
        .btn-secondary:hover {
            background: #ddd;
        }
        
        /* ============ 卡片样式 ============ */
        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        
        .card h3 {
            margin-bottom: 10px;
            color: #333;
        }
        
        .card p {
            color: #666;
            font-size: 0.9em;
        }
        
        /* ============ 列表样式 ============ */
        .list-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #eee;
        }
        
        .list-item:last-child {
            border-bottom: none;
        }
        
        .list-item .icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: #f0f0f0;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 12px;
        }
        
        .list-item .info {
            flex: 1;
        }
        
        .list-item .info h4 {
            font-size: 1em;
            margin-bottom: 4px;
        }
        
        .list-item .info p {
            font-size: 0.85em;
            color: #999;
        }
        
        /* ============ 提示样式 ============ */
        .alert {
            padding: 12px 16px;
            border-radius: 8px;
            margin-bottom: 16px;
        }
        
        .alert-success {
            background: #d4edda;
            color: #155724;
        }
        
        .alert-error {
            background: #f8d7da;
            color: #721c24;
        }
        
        .alert-info {
            background: #cce5ff;
            color: #004085;
        }
        
        /* ============ 底部导航 ============ */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 50%;
            transform: translateX(-50%);
            width: 100%;
            max-width: 480px;
            background: white;
            border-top: 1px solid #eee;
            display: flex;
            padding: 10px 0;
        }
        
        .bottom-nav a {
            flex: 1;
            text-align: center;
            text-decoration: none;
            color: #999;
            font-size: 0.85em;
            padding: 8px 0;
        }
        
        .bottom-nav a.active {
            color: #667eea;
        }
        
        .bottom-nav a span {
            display: block;
            font-size: 1.5em;
            margin-bottom: 4px;
        }
        
        /* ============ 工具类 ============ */
        .text-center { text-align: center; }
        .text-muted { color: #999; }
        .mt-10 { margin-top: 10px; }
        .mt-20 { margin-top: 20px; }
        .mb-10 { margin-bottom: 10px; }
        .mb-20 { margin-bottom: 20px; }
        .hidden { display: none; }
        
        /* ============ 响应式 ============ */
        @media (max-width: 480px) {
            .container {
                box-shadow: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 头部 -->
        <div class="header">
            <h1>{功能名}</h1>
            <p>{功能描述}</p>
        </div>
        
        <!-- 内容区 -->
        <div class="content">
            <!-- 在此添加原型内容 -->
            <div class="card">
                <h3>示例卡片</h3>
                <p>这是一个示例卡片，展示基本样式。</p>
            </div>
            
            <div class="form-group">
                <label>示例输入框</label>
                <input type="text" placeholder="请输入内容">
            </div>
            
            <button class="btn btn-primary" onclick="showAlert()">示例按钮</button>
        </div>
    </div>
    
    <script>
        // ============ 交互逻辑 ============
        
        // 示例：显示提示
        function showAlert() {
            alert('按钮点击成功！');
        }
        
        // 示例：表单验证
        function validateForm() {
            // 添加表单验证逻辑
            return true;
        }
        
        // 示例：状态切换
        function toggleState(element) {
            element.classList.toggle('active');
        }
        
        // 页面加载完成
        document.addEventListener('DOMContentLoaded', function() {
            console.log('原型加载完成');
        });
    </script>
</body>
</html>
