<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>产品原型索引</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 
                         'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', 
                         sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
        }
        
        h1 {
            color: white;
            text-align: center;
            margin-bottom: 10px;
            font-size: 2.5em;
            font-weight: 700;
        }
        
        .subtitle {
            color: rgba(255,255,255,0.8);
            text-align: center;
            margin-bottom: 40px;
            font-size: 1em;
        }
        
        .stats {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-bottom: 40px;
        }
        
        .stat-item {
            text-align: center;
            color: white;
        }
        
        .stat-item .number {
            font-size: 2em;
            font-weight: 700;
        }
        
        .stat-item .label {
            font-size: 0.9em;
            opacity: 0.8;
        }
        
        .iteration {
            background: white;
            border-radius: 16px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .iteration-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 2px solid #eee;
        }
        
        .iteration h2 {
            color: #333;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.75em;
            font-weight: 500;
        }
        
        .badge-active {
            background: #e8f5e9;
            color: #2e7d32;
        }
        
        .badge-archived {
            background: #f5f5f5;
            color: #757575;
        }
        
        .cards {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 16px;
        }
        
        .card {
            background: #fafafa;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            border: 1px solid #eee;
        }
        
        .card:hover {
            transform: translateY(-4px);
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
        }
        
        .card h3 {
            margin-bottom: 8px;
            color: #333;
            font-size: 1.1em;
        }
        
        .card p {
            color: #666;
            font-size: 0.9em;
            margin-bottom: 12px;
            line-height: 1.5;
        }
        
        .card .meta {
            font-size: 0.8em;
            color: #999;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .card .status {
            display: flex;
            gap: 6px;
            margin-bottom: 16px;
        }
        
        .card .status span {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #ddd;
        }
        
        .card .status span.done {
            background: #4caf50;
        }
        
        .card .status span.pending {
            background: #ff9800;
        }
        
        .card .links {
            display: flex;
            gap: 8px;
        }
        
        .card a {
            padding: 8px 16px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 0.85em;
            font-weight: 500;
            transition: opacity 0.2s;
        }
        
        .card a:hover {
            opacity: 0.8;
        }
        
        .card .prototype {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .card .requirement {
            background: #eee;
            color: #333;
        }
        
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        
        .empty-icon {
            font-size: 3em;
            margin-bottom: 16px;
        }
        
        .footer {
            text-align: center;
            color: rgba(255,255,255,0.6);
            margin-top: 40px;
            font-size: 0.85em;
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            h1 { font-size: 1.8em; }
            .stats { gap: 20px; }
            .stat-item .number { font-size: 1.5em; }
            .cards { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>📋 产品原型索引</h1>
        <p class="subtitle">最后更新：{更新日期}</p>
        
        <!-- 统计 -->
        <div class="stats">
            <div class="stat-item">
                <div class="number">{迭代数}</div>
                <div class="label">迭代</div>
            </div>
            <div class="stat-item">
                <div class="number">{功能数}</div>
                <div class="label">功能</div>
            </div>
            <div class="stat-item">
                <div class="number">{原型数}</div>
                <div class="label">原型</div>
            </div>
        </div>
        
        <!-- 迭代列表 -->
        <div class="iteration">
            <div class="iteration-header">
                <h2>📁 {迭代名称}</h2>
                <span class="badge badge-active">进行中</span>
            </div>
            <div class="cards">
                <div class="card">
                    <h3>{功能名}</h3>
                    <p>{功能描述}</p>
                    <div class="status" title="澄清 | 需求 | 原型">
                        <span class="done" title="澄清完成"></span>
                        <span class="done" title="需求完成"></span>
                        <span class="done" title="原型完成"></span>
                    </div>
                    <div class="meta">
                        <span>👤 {产品经理}</span>
                        <span>•</span>
                        <span>更新于 {日期}</span>
                    </div>
                    <div class="links">
                        <a href="./{迭代}/html/{功能名}-prototype.html" class="prototype">查看原型</a>
                        <a href="./{迭代}/requirements/{功能名}-需求.md" class="requirement">需求文档</a>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 空状态示例 -->
        <!--
        <div class="iteration">
            <div class="iteration-header">
                <h2>📁 新迭代</h2>
                <span class="badge badge-active">进行中</span>
            </div>
            <div class="empty">
                <div class="empty-icon">📭</div>
                <p>暂无原型，执行 /pm.prototype 创建第一个原型</p>
            </div>
        </div>
        -->
        
        <div class="footer">
            <p>由 /pm.prototype 规约自动生成和维护</p>
        </div>
    </div>
</body>
</html>
